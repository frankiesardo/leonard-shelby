<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#fafaf8"/>
  <!-- trunk -->
  <line x1="16" y1="29" x2="16" y2="17" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <!-- roots -->
  <line x1="16" y1="29" x2="12" y2="31" stroke="#2563eb" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="29" x2="20" y2="31" stroke="#2563eb" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- main branches -->
  <line x1="16" y1="17" x2="8" y2="11" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="24" y2="10" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="20" x2="10" y2="17" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="20" x2="22" y2="17" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round"/>
  <!-- sub-branches -->
  <line x1="8" y1="11" x2="5" y2="6" stroke="#2563eb" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="11" x2="12" y2="6" stroke="#2563eb" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="10" x2="21" y2="5" stroke="#2563eb" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="10" x2="28" y2="6" stroke="#2563eb" stroke-width="1" stroke-linecap="round"/>
  <!-- cross-connections (knowledge graph feel) -->
  <line x1="12" y1="6" x2="21" y2="5" stroke="#2563eb" stroke-width="0.6" stroke-linecap="round" opacity="0.3" stroke-dasharray="1 1.5"/>
  <line x1="10" y1="17" x2="22" y2="17" stroke="#2563eb" stroke-width="0.6" stroke-linecap="round" opacity="0.2" stroke-dasharray="1 1.5"/>
  <!-- nodes (leaves / ideas) -->
  <circle cx="16" cy="17" r="2" fill="#2563eb"/>
  <circle cx="8" cy="11" r="2" fill="#2563eb" opacity="0.85"/>
  <circle cx="24" cy="10" r="2" fill="#2563eb" opacity="0.85"/>
  <circle cx="5" cy="6" r="1.5" fill="#2563eb" opacity="0.6"/>
  <circle cx="12" cy="6" r="1.5" fill="#2563eb" opacity="0.6"/>
  <circle cx="21" cy="5" r="1.5" fill="#2563eb" opacity="0.6"/>
  <circle cx="28" cy="6" r="1.5" fill="#2563eb" opacity="0.6"/>
  <circle cx="10" cy="17" r="1.5" fill="#2563eb" opacity="0.5"/>
  <circle cx="22" cy="17" r="1.5" fill="#2563eb" opacity="0.5"/>
</svg>
