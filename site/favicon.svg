<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#fafaf8"/>
  <!-- stem -->
  <line x1="16" y1="28" x2="16" y2="14" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <!-- left branch -->
  <line x1="16" y1="21" x2="10" y2="16" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <!-- right branch -->
  <line x1="16" y1="18" x2="22" y2="13" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <!-- nodes (ideas) -->
  <circle cx="16" cy="11" r="3" fill="#2563eb"/>
  <circle cx="8"  cy="14" r="2.5" fill="#2563eb" opacity="0.7"/>
  <circle cx="24" cy="11" r="2.5" fill="#2563eb" opacity="0.7"/>
  <!-- small leaf on left branch -->
  <circle cx="10" cy="16" r="1.8" fill="#2563eb" opacity="0.45"/>
</svg>
